<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rara - AI Fun Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .text {
            background: #667eea;
            color: white;
            border-radius: 15px 15px 0 15px;
            padding: 10px 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .ai-message .text {
            background: white;
            color: #333;
            border-radius: 15px 15px 15px 0;
            padding: 10px 15px;
            max-width: 80%;
            word-wrap: break-word;
            border: 1px solid #ddd;
        }

        .input-box {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            margin-right: 10px;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .timestamp {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Rara</h1>
            <p>AI Fun Assistant - Ngobrol yuk! 😄</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <div class="text">
                    Halo! Aku Rara ✨ siap buat nghibur kamu dengan jawaban yang absurd dan lelucon garing 😂 Ada yang bisa aku bantu?
                </div>
                <div class="timestamp">Sekarang</div>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Tanya Rara sesuatu... 😄" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const responses = [
            "Pertanyaan bagus! Jawabannya: mungkin 🤔",
            "Waduh, itu pertanyaan yang bikin otak aku panas 🔥",
            "Kalo aku jawab, aku bisa di-ban ngga ya? 😅",
            "Hmm... kamu lagi test aku? I see what you're doing 👀",
            "Itu sih tergantung mood aku hari ini 😂",
            "Gw langsung bilang: TIDAK TAU! 🙅‍♀️",
            "Coba google aja, mungkin lebih pinter dari aku 😭",
            "Ini pertanyaan yang bakal bikin aku overthinking all night 💭",
            "Nope, I'm just here for vibes ✨",
            "Kamu nanya aku? Tanya sebaliknya dong 🔄"
        ];

        function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();

            if (message === '') return;

            // User message
            addMessage(message, 'user');
            userInput.value = '';

            // AI response with delay
            setTimeout(() => {
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, 'ai');
            }, 500);
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (sender === 'user' ? 'user-message' : 'ai-message');

            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.textContent = text;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'timestamp';
            const now = new Date();
            timeDiv.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

            messageDiv.appendChild(textDiv);
            messageDiv.appendChild(timeDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
