<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI Companion — Fixed</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--muted:#64748b;--accent:#6d28d9;--accent2:#ec4899;--user:#0ea5e9}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:#0f172a}
.wrap{max-width:1100px;margin:18px auto;padding:12px;display:grid;grid-template-columns:280px 1fr 300px;gap:16px}
.panel{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(10,20,40,0.06)}
.modes,.emotions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.chip{padding:8px;border-radius:8px;border:1px solid #e6edf3;text-align:center;cursor:pointer;background:#fff}
.chip.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.messages{height:58vh;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:78%;padding:10px;border-radius:10px}
.msg.user{align-self:flex-end;background:linear-gradient(90deg,var(--user),#0369a1);color:#fff}
.msg.ai{align-self:flex-start;background:#fff}
.input-area{display:flex;gap:8px;margin-top:8px}
input[type="text"]{flex:1;padding:10px;border-radius:8px;border:1px solid #e6edf3}
button{padding:8px 10px;border-radius:8px;border:0;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;cursor:pointer}
.small{padding:6px 8px;background:#fff;border:1px solid #e6edf3;color:#111}
.tiny{font-size:0.8rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<aside class="panel">
<h3>Pengaturan</h3>
<label class="tiny">Nama AI</label>
<input id="aiName" type="text" value="Luna" />
<label class="tiny" style="margin-top:8px">Nickname Anda</label>
<input id="userNickname" type="text" value="Sayang" />
<label class="tiny" style="margin-top:8px">Mode</label>
<div id="modes" class="modes">
<div class="chip active" data-mode="casual">Casual</div>
<div class="chip" data-mode="friend">Friend</div>
<div class="chip" data-mode="therapist">Therapist</div>
<div class="chip" data-mode="romantic">Romantic</div>
</div>
<div style="margin-top:10px">
<label class="tiny">Adult (non-eksplisit)</label>
<div style="display:flex;gap:8px;margin-top:6px">
<div id="adultSwitch" class="small">Toggle</div>
<div id="adultConfirm" class="small">Konfirmasi</div>
</div>
<div class="tiny" style="margin-top:6px">Hanya diskusi non-eksplisit. Kata eksplisit diblokir.</div>
</div>
</aside>

<main class="panel">
<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<div id="hdrName" style="font-weight:700">Luna</div>
<div id="hdrStatus" class="tiny">Siap • Mode: Casual</div>
</div>
<div class="tiny" id="timeGreet"></div>
</div>

<div id="messages" class="messages" aria-live="polite"></div>

<div id="typing" class="tiny" style="display:none">AI sedang mengetik...</div>

<div class="input-area">
<input id="uinput" type="text" placeholder="Ketik pesan... (Enter untuk kirim)" />
<button id="sendBtn">Kirim</button>
<button id="exportChat" class="small">Export</button>
</div>
</main>

<aside class="panel">
<h3>Tools</h3>
<div style="margin-bottom:8px"><button id="clearChat" class="small">Clear Chat</button></div>
<div><label class="tiny">Import .json</label><input id="fileInput" type="file" accept=".json" /></div>
</aside>
</div>

<script>
/* Minimal working safe companion (client-side only) */
const state = {
aiName: localStorage.getItem('aiName') || 'Luna',
userNickname: localStorage.getItem('userNickname') || 'Sayang',
mode: localStorage.getItem('mode') || 'casual',
adultEnabled: localStorage.getItem('adultEnabled') === 'true',
messages: JSON.parse(localStorage.getItem('messages') || '[]')
};

const els = {
aiName: document.getElementById('aiName'),
userNickname: document.getElementById('userNickname'),
modes: document.getElementById('modes'),
adultSwitch: document.getElementById('adultSwitch'),
adultConfirm: document.getElementById('adultConfirm'),
hdrName: document.getElementById('hdrName'),
hdrStatus: document.getElementById('hdrStatus'),
timeGreet: document.getElementById('timeGreet'),
messages: document.getElementById('messages'),
typing: document.getElementById('typing'),
uinput: document.getElementById('uinput'),
sendBtn: document.getElementById('sendBtn'),
exportChat: document.getElementById('exportChat'),
clearChat: document.getElementById('clearChat'),
fileInput: document.getElementById('fileInput')
};

function saveState(){ localStorage.setItem('aiName', state.aiName); localStorage.setItem('userNickname', state.userNickname); localStorage.setItem('mode', state.mode); localStorage.setItem('adultEnabled', state.adultEnabled); localStorage.setItem('messages', JSON.stringify(state.messages)); }

function init(){
els.aiName.value = state.aiName;
els.userNickname.value = state.userNickname;
els.hdrName.textContent = state.aiName;
renderModes();
renderMessages();
updateTimeGreet();
}
function renderModes(){
[...els.modes.querySelectorAll('.chip')].forEach(c=>{
c.classList.toggle('active', c.dataset.mode === state.mode);
});
}
els.modes.addEventListener('click', e=>{
const chip = e.target.closest('.chip');
if(!chip) return;
state.mode = chip.dataset.mode;
renderModes();
saveState();
els.hdrStatus.textContent = Siap • Mode: ${state.mode};
});

els.aiName.addEventListener('input', e=>{ state.aiName = e.target.value || 'Luna'; els.hdrName.textContent = state.aiName; saveState(); });
els.userNickname.addEventListener('input', e=>{ state.userNickname = e.target.value || 'Sayang'; saveState(); });

els.adultSwitch.addEventListener('click', ()=>{ state.adultEnabled = !state.adultEnabled; els.adultSwitch.textContent = state.adultEnabled ? 'On' : 'Off'; saveState(); });
els.adultConfirm.addEventListener('click', ()=>{ const ok = confirm('Konfirmasi: saya berusia 18+ dan setuju diskusi non-eksplisit.'); if(ok){ state.adultEnabled = true; els.adultSwitch.textContent = 'On'; saveState(); alert('Adult mode aktif (non-eksplisit).'); } });

const explicit = ['ngentot','porn','fuck','sex','pornografi','masturb','anal','oral'];
function containsExplicit(text){ const t = text.toLowerCase(); return explicit.some(w=>t.includes(w)); }

function detectTopic(t){
const s = t.toLowerCase();
if(/(cinta|pacar|hubungan)/.test(s)) return 'romance';
if(/(saran|masalah|nasihat)/.test(s)) return 'advice';
return 'general';
}

function generateResponse(userText){
if(containsExplicit(userText)){
return "Maaf, saya tidak dapat membahas konten seksual eksplisit. Kita bisa membahas hubungan, emosi, atau saran tanpa detail seksual.";
}
const topic = detectTopic(userText);
const templates = {
casual: ["Oh ya? Ceritakan lebih lanjut tentang %s.","Menarik. Mengapa kamu merasa begitu soal %s?"],
friend: ["Sebagai teman, aku mendengarkan. Apa yang terjadi terkait %s?"],
therapist: ["Mari kita lihat: ketika menyebut %s, apa yang kamu rasakan?"],
romantic: ["Itu terdengar hangat. Bagaimana momen %s membuatmu merasa?"]
};
const base = templates[state.mode] || templates['casual'];
let tmpl = base[Math.floor(Math.random()*base.length)];
const sub = (topic === 'general') ? userText.split(' ').slice(0,6).join(' ') : topic;
return tmpl.replace('%s', sub);
}

function renderMessages(){
els.messages.innerHTML = '';
state.messages.forEach(m=>{
const d = document.createElement('div');
d.className = 'msg ' + (m.role === 'user' ? 'user':'ai');
d.innerHTML = <div>${escapeHtml(m.text)}</div><div class="tiny" style="margin-top:6px">${new Date(m.ts).toLocaleString()}</div>;
els.messages.appendChild(d);
});
els.messages.scrollTop = els.messages.scrollHeight;
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

els.sendBtn.addEventListener('click', ()=> send());
els.uinput.addEventListener('keydown', e=>{ if(e.key === 'Enter') send(); });

function send(){
const text = els.uinput.value.trim();
if(!text) return;
state.messages.push({role:'user', text, ts: Date.now()});
els.uinput.value = '';
renderMessages();
saveState();

// Simulate typing
els.typing.style.display = 'block';
setTimeout(()=>{
els.typing.style.display = 'none';
const resp = generateResponse(text);
state.messages.push({role:'ai', text: resp, ts: Date.now()});
renderMessages();
saveState();
}, 600 + Math.floor(Math.random()*600));
}

els.exportChat.addEventListener('click', ()=>{
const blob = new Blob([JSON.stringify({messages:state.messages},null,2)],{type:'application/json'});
const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'chat.json'; a.click();
});

els.clearChat.addEventListener('click', ()=>{ if(confirm('Hapus semua chat?')){ state.messages = []; saveState(); renderMessages(); } });

els.fileInput.addEventListener('change', e=>{
const f = e.target.files0; if(!f) return;
const r = new FileReader(); r.onload = ()=> {
try{
const j = JSON.parse(r.result);
if(Array.isArray(j.messages)){ state.messages = j.messages; saveState(); renderMessages(); alert('Import berhasil'); }
else alert('Format file tidak dikenali');
}catch(err){ alert('Gagal membaca file'); }
};
r.readAsText(f);
});

function updateTimeGreet(){
const h = new Date().getHours(); let g = 'Halo';
if(h<12) g='Selamat pagi'; else if(h<18) g='Selamat siang'; else g='Selamat sore';
els.timeGreet.textContent = g;
}
setInterval(updateTimeGreet,60000);

init();

</script>
</body>
</html>
