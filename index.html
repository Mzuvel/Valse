<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Assistant</title>
    <style>
        /* Tampilan yang kalem dan tidak menyakitkan mata (Dark Mode) */
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #282a36;
            --user-msg: #cba6f7;
            --ai-msg: #89b4fa;
            --text-light: #cdd6f4;
            --text-dark: #11111b;
            --accent: #f38ba8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container Utama */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header & Efek AI */
        .header {
            padding: 20px;
            background-color: rgba(30, 30, 46, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #313244;
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ai-orb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--ai-msg) 0%, transparent 80%);
            box-shadow: 0 0 15px var(--ai-msg);
            animation: pulse 3s infinite alternate;
            transition: all 0.3s ease;
        }

        .ai-orb.thinking {
            background: radial-gradient(circle, var(--accent) 0%, transparent 80%);
            box-shadow: 0 0 25px var(--accent);
            animation: fastPulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes fastPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .controls button {
            background: transparent;
            border: 1px solid var(--text-light);
            color: var(--text-light);
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .controls button:hover {
            background: var(--text-light);
            color: var(--text-dark);
        }

        /* Area Pesan */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: popIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background-color: var(--user-msg);
            color: var(--text-dark);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.ai {
            background-color: #313244;
            color: var(--text-light);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border-left: 3px solid var(--ai-msg);
        }

        /* Area Input */
        .input-area {
            padding: 20px;
            background-color: rgba(30, 30, 46, 0.9);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 25px;
            border: none;
            background-color: #313244;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s ease;
        }

        .input-area input:focus {
            box-shadow: 0 0 10px rgba(203, 166, 247, 0.5);
        }

        .action-btn {
            background-color: var(--ai-msg);
            color: var(--text-dark);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(137, 180, 250, 0.3);
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .mic-btn {
            background-color: #f38ba8;
        }

        .mic-btn.listening {
            animation: fastPulse 0.5s infinite alternate;
        }
        
        /* Setup API Key Overlay */
        .api-setup {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30, 30, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        .api-setup input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
        }
        
        .api-setup button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: var(--user-msg);
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Overlay untuk memasukkan API Key pertama kali -->
        <div id="apiOverlay" class="api-setup">
            <h2>Selamat Datang!</h2>
            <p>Untuk membuat AI ini pintar, masukkan Google Gemini API Key kamu.</p>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 10px;">(Dapatkan gratis di Google AI Studio)</p>
            <input type="password" id="apiKeyInput" placeholder="Paste API Key di sini...">
            <button onclick="saveApiKey()">Simpan & Mulai</button>
        </div>

        <div class="header">
            <div class="ai-status">
                <div class="ai-orb" id="aiOrb"></div>
                <div>
                    <h1>Asisten Pribadi</h1>
                    <span style="font-size: 0.8rem; opacity: 0.7;" id="statusText">Online & Siap Membantu</span>
                </div>
            </div>
            <div class="controls">
                <button onclick="clearChat()">Hapus Obrolan</button>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <!-- Pesan akan muncul di sini -->
        </div>

        <div class="input-area">
            <button class="action-btn mic-btn" id="micBtn" onclick="toggleMic()" title="Bicara">🎤</button>
            <input type="text" id="userInput" placeholder="Ketik perintah atau pertanyaanmu di sini..." onkeypress="handleEnter(event)">
            <button class="action-btn" onclick="sendMessage()" title="Kirim">➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const aiOrb = document.getElementById('aiOrb');
        const statusText = document.getElementById('statusText');
        const micBtn = document.getElementById('micBtn');
        const apiOverlay = document.getElementById('apiOverlay');
        
        let API_KEY = localStorage.getItem('gemini_api_key') || "";

        // Cek apakah API Key sudah ada
        if(API_KEY) {
            apiOverlay.style.display = 'none';
            loadChatHistory();
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value;
            if(key.trim() !== "") {
                API_KEY = key;
                localStorage.setItem('gemini_api_key', key);
                apiOverlay.style.display = 'none';
                appendMessage("AI", "Halo! Aku sudah aktif dan siap membantumu. Ada yang bisa aku bantu hari ini?");
            }
        }

        // Fitur Pengenalan Suara (Speech to Text)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            recognition.interimResults = false;

            recognition.onstart = function() {
                isListening = true;
                micBtn.classList.add('listening');
                userInput.placeholder = "Mendengarkan suara kamu...";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                sendMessage();
            };

            recognition.onend = function() {
                isListening = false;
                micBtn.classList.remove('listening');
                userInput.placeholder = "Ketik perintah atau pertanyaanmu di sini...";
            };
        }

        function toggleMic() {
            if (!SpeechRecognition) {
                alert("Maaf, browsermu belum mendukung fitur mikrofon.");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        // Fitur Text to Speech (AI Berbicara)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            utterance.rate = 1.1; // Kecepatan bicara
            window.speechSynthesis.speak(utterance);
        }

        // Fungsi Menangani Tekan Enter
        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(sender, text, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender === 'User' ? 'user' : 'ai');
            
            // Render text sederhana (bisa dikembangkan pakai markdown parser jika mau)
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            if(save) saveChat();
            
            // Jika pesannya dari AI, baca teksnya
            if(sender === 'AI') {
                // Hapus simbol markdown (*) agar saat dibaca terdengar natural
                let cleanText = text.replace(/[*#_]/g, '');
                speak(cleanText);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('User', text);
            userInput.value = '';

            // Efek AI sedang berpikir
            aiOrb.classList.add('thinking');
            statusText.innerText = "Sedang berpikir...";

            try {
                // Memanggil Google Gemini API (Model Flash terbaru)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: {
                            role: "user",
                            parts: [{ text: "Kamu adalah asisten AI pribadi yang cerdas, sopan, dan santai. Gunakan bahasa Indonesia sehari-hari (aku/kamu). Jangan gunakan kata gue/lu/lo. Bantu user menyelesaikan tugas, menjawab pertanyaan, atau melakukan instruksi apa pun dengan baik." }]
                        }
                    })
                });

                const data = await response.json();

                if (data.error) {
                    appendMessage('AI', `Terjadi kesalahan: ${data.error.message}`);
                } else {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage('AI', aiReply);
                }
            } catch (error) {
                appendMessage('AI', "Maaf, koneksi terputus atau API Key tidak valid. Coba cek lagi ya.");
            } finally {
                aiOrb.classList.remove('thinking');
                statusText.innerText = "Online & Siap Membantu";
            }
        }

        // Fitur Simpan History Chat
        function saveChat() {
            localStorage.setItem('chat_history', chatBox.innerHTML);
        }

        function loadChatHistory() {
            const savedChat = localStorage.getItem('chat_history');
            if (savedChat) {
                chatBox.innerHTML = savedChat;
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                appendMessage("AI", "Halo! Aku sudah aktif dan siap membantumu. Ada yang bisa aku bantu hari ini?", false);
            }
        }

        function clearChat() {
            if(confirm("Yakin ingin menghapus semua riwayat obrolan?")) {
                chatBox.innerHTML = '';
                localStorage.removeItem('chat_history');
                appendMessage("AI", "Riwayat telah dihapus. Mari mulai obrolan baru!");
            }
        }
    </script>
</body>
</html>
